<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#003C71" />
  <title>Crown Land Spatial Hub</title>

  <style>
    :root{
      --cl-primary:#003C71;
      --cl-accent:#0096D6;
      --cl-bg:#F5F7FA;
      --cl-surface:#FFFFFF;
      --cl-text:#1F2A37;
      --cl-muted:#6B7280;
      --cl-border:#E5E7EB;
      --radius:12px;
      --shadow-soft:0 6px 16px rgba(0,0,0,.08);
      --maxw:1200px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font:16px/1.5 system-ui,-apple-system,"Segoe UI",Roboto,Arial;
      background:var(--cl-bg);
      color:var(--cl-text);
    }
    img{max-width:100%;display:block}
    a{text-decoration:none;color:var(--cl-accent)}
    .container{max-width:var(--maxw);margin:auto;padding:0 16px}

    .topbar{background:#fff;border-bottom:1px solid var(--cl-border)}
    .topbar__inner{display:flex;justify-content:space-between;align-items:center;padding:10px 16px}
    .brand{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--cl-primary)}
    .brand img{height:28px}
    .nav a{margin-left:16px;font-weight:600;color:var(--cl-text)}

    .hero{
      min-height:320px;
      display:flex;
      align-items:center;
      color:#fff;
      background:linear-gradient(180deg, rgba(0,60,113,.65), rgba(0,60,113,.4));
    }
    .hero__inner{padding:64px 16px}
    .hero h1{font-size:42px;margin:0 0 10px}
    .hero p{color:#E8EEF5}

    .btn{
      display:inline-block;
      padding:10px 14px;
      border-radius:8px;
      font-weight:700;
    }
    .btn--primary{background:#0096D6;color:#fff}
    .btn--ghost{border:2px solid #fff;color:#fff}

    section{padding:26px 0}
    .grid{display:grid;gap:18px;grid-template-columns:repeat(4,1fr)}
    @media(max-width:1100px){.grid{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:800px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:520px){.grid{grid-template-columns:1fr}}

    .card{
      background:#fff;
      border:1px solid var(--cl-border);
      border-radius:var(--radius);
      box-shadow:var(--shadow-soft);
      display:flex;
      flex-direction:column;
      min-height:260px;
      position:relative;
    }
    .card__media{
      height:120px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-bottom:1px solid var(--cl-border);
      background:#F8FAFC;
    }
    .card__media img{max-height:70px}
    .card__body{padding:12px 14px}
    .card__title{margin:0 0 6px;font-size:16.5px}
    .card__text{color:var(--cl-muted);font-size:14.5px}
    .card__actions{padding:10px 14px 14px}

    .badge{
      position:absolute;
      top:10px;
      left:10px;
      padding:3px 8px;
      font-size:12px;
      font-weight:700;
      border-radius:999px;
      background:#DBEAFE;
      color:#1E3A8A;
    }
    .badge--training{background:#FEF3C7;color:#92400E}
  </style>
</head>

<body>

<header class="topbar">
  <div class="topbar__inner container">
    <div class="brand">
      <img src="assets/nsw-logo.svg" alt="NSW Government logo">
      <span>Crown Land Spatial Hub</span>
    </div>
    <nav class="nav">
      <a href="#apps">Applications</a>
      <a href="#support">Support</a>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="hero__inner container">
    <h1>Crown Land Spatial HUB</h1>
    <p>ArcGIS Online Applications, Reporting Tools & Dashboards</p>
    <a class="btn btn--primary" href="#apps">Browse Applications</a>
    <a class="btn btn--ghost" href="#support">Contact Support</a>
  </div>
</section>

<main id="apps" class="container">
  <h2>Operational Applications</h2>

  <div class="grid">

    <!-- 1 -->
