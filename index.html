<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#003C71" />
  <title>Crown Land Spatial Hub</title>

  <!--
    Spatial HUB – Standalone HTML for embedding via ArcGIS Hub Iframe card
    Author: Crown Land Spatial Services
    Notes:
      • Replace placeholder links (#) with your real app URLs.
      • Replace image paths in the HERO and icons with your hosted assets (WebP/JPG/PNG).
      • Colours use NSW-friendly palette; adjust variables as needed.
  -->

  <style>
    /* ============= CSS Variables (Brand Palette) ============= */
    :root{
      --cl-primary:#003C71;   /* Deep navy */
      --cl-accent:#0096D6;    /* Bright blue (buttons/links) */
      --cl-success:#2E7D32;   /* Green badges (unused here but kept) */
      --cl-bg:#F5F7FA;        /* Page background */
      --cl-surface:#FFFFFF;   /* Cards */
      --cl-text:#1F2A37;      /* Headings */
      --cl-muted:#6B7280;     /* Body text */
      --cl-border:#E5E7EB;    /* Subtle borders */
      --radius:12px;
      --shadow:0 10px 24px rgba(0,0,0,.10);
      --shadow-soft:0 6px 16px rgba(0,0,0,.08);
      --maxw:1200px;
    }

    /* ============= Base / Reset ============= */
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font:16px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji","Segoe UI Emoji";
      color:var(--cl-text);
      background:var(--cl-bg);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    img{max-width:100%;height:auto;display:block}
    a{color:var(--cl-accent);text-decoration:none}
    a:hover{text-decoration:underline}
    .container{max-width:var(--maxw);margin-inline:auto;padding-inline:16px}

    /* ============= Header / Top Navigation (original style) ============= */
    .topbar{background:#fff;border-bottom:1px solid var(--cl-border)}
    .topbar__inner{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 16px}
    .brand{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--cl-primary)}
    .brand img{height:28px;width:auto}
    .nav{display:flex;gap:16px;flex-wrap:wrap}
    .nav a{color:var(--cl-text);font-weight:600;border-bottom:2px solid transparent;padding-bottom:2px}
    .nav a:hover{border-color:var(--cl-accent)}
    .skip-link{position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden}
    .skip-link:focus{left:16px;top:16px;width:auto;height:auto;background:#fff;border:2px solid var(--cl-accent);padding:8px 10px;border-radius:6px;z-index:9999}

    /* ============= HERO (retain look & feel, add CLSS.png, remove beach) ============= */
    .hero{
      position:relative; isolation:isolate;
      min-height:320px;
      display:flex; align-items:center;
      color:#fff; background:#18384e;
    }
    /* Beach image removed – keep the gradient only for contrast */
    .hero::after{
      content:""; position:absolute; inset:0;
      background:linear-gradient(180deg, rgba(0,60,113,.65) 0%, rgba(0,60,113,.55) 60%, rgba(0,60,113,.40) 100%);
      z-index:-1;
    }
    .hero__inner{padding:64px 16px}
    .hero h1{font-size:42px;line-height:1.15;margin:0 0 10px}
    .hero p{margin:0 0 18px;color:#E8EEF5}
    .cta{display:flex;gap:10px;flex-wrap:wrap}
    .btn{display:inline-block;padding:10px 14px;border-radius:8px;font-weight:700;text-decoration:none}
    .btn--primary{background:#0096D6;color:#fff;box-shadow:var(--shadow-soft)}
    .btn--ghost{background:transparent;border:2px solid #fff;color:#fff}

    /* --- NEW: overlay container + responsive hero PNG --- */
    .hero__overlay{
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      pointer-events:none;
      padding:32px 16px;
    }
    .hero__logo{
      width:min(820px, 78vw); /* scale nicely across devices */
      height:auto;
      filter:drop-shadow(0 8px 16px rgba(0,0,0,.30)); /* subtle pop */
    }

    /* ============= Sections / Headings ============= */
