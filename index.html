<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#003C71" />
  <title>Crown Land Spatial Hub</title>

  <style>
    :root{
      --cl-primary:#003C71;
      --cl-accent:#0096D6;
      --cl-success:#2E7D32;
      --cl-bg:#F5F7FA;
      --cl-surface:#FFFFFF;
      --cl-text:#1F2A37;
      --cl-muted:#6B7280;
      --cl-border:#E5E7EB;
      --radius:12px;
      --shadow:0 10px 24px rgba(0,0,0,.10);
      --shadow-soft:0 6px 16px rgba(0,0,0,.08);
      --maxw:1200px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font:16px/1.5 system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;
      color:var(--cl-text);
      background:var(--cl-bg);
    }
    img{max-width:100%;height:auto;display:block}
    a{color:var(--cl-accent);text-decoration:none}
    a:hover{text-decoration:underline}
    .container{max-width:var(--maxw);margin-inline:auto;padding-inline:16px}

    .topbar{background:#fff;border-bottom:1px solid var(--cl-border)}
    .topbar__inner{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 16px}
    .brand{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--cl-primary)}
    .brand img{height:28px}
    .nav{display:flex;gap:16px;flex-wrap:wrap}
    .nav a{color:var(--cl-text);font-weight:600;border-bottom:2px solid transparent}
    .nav a:hover{border-color:var(--cl-accent)}

    .skip-link{position:absolute;left:-9999px}
    .skip-link:focus{left:16px;top:16px;background:#fff;border:2px solid var(--cl-accent);padding:8px}

    .hero{
      min-height:320px;
      display:flex;
      align-items:center;
      color:#fff;
      background:linear-gradient(
        180deg,
        rgba(0,60,113,.65),
        rgba(0,60,113,.4)
      );
    }
    .hero__inner{padding:64px 16px}
    .hero h1{font-size:42px;line-height:1.15;margin:0 0 10px}
    .hero p{margin:0 0 18px;color:#E8EEF5}

    .cta{display:flex;gap:10px;flex-wrap:wrap}
    .btn{display:inline-block;padding:10px 14px;border-radius:8px;font-weight:700}
    .btn--primary{background:#0096D6;color:#fff}
    .btn--ghost{background:transparent;border:2px solid #fff;color:#fff}

    section{padding:26px 0}
    .section-header{margin-bottom:12px}
    .section-header h2{margin:0;font-size:22px;color:var(--cl-primary)}

    .grid{display:grid;gap:18px;grid-template-columns:repeat(4,1fr)}
    @media(max-width:1100px){.grid{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:800px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:520px){.grid{grid-template-columns:1fr}}

    .card{
      position:relative;
      background:#fff;
      border:1px solid var(--cl-border);
      border-radius:var(--radius);
      box-shadow:var(--shadow-soft);
      display:flex;
      flex-direction:column;
      min-height:260px
    }
    .card__media{
      height:120px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#F8FAFC;
      border-bottom:1px solid var(--cl-border)
    }
    .card__media img{max-height:70px}
    .card__body{padding:12px 14px 6px}
    .card__title{margin:0 0 6px;font-size:16.5px}
    .card__text{margin:0;color:var(--cl-muted);font-size:14.5px}
    .card__actions{padding:10px 14px 14px}

    .badge{
      position:absolute;
      top:10px;
      left:10px;
      background:#DBEAFE;
      color:#1E3A8A;
      border-radius:9999px;
      padding:3px 8px;
      font-size:12px;
      font-weight:800
    }
    .badge--training{background:#FEF3C7;color:#92400E}

    footer{background:#F1F5F9;border-top:1px solid var(--cl-border)}
    .footer__inner{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:14px 16px;
      flex-wrap:wrap
    }
