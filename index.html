
<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#003C71" />
  <title>Crown Land Spatial Hub</title>

  <style>

:root{
  --cl-primary:#002664;   /* NSW Government Blue */
  --cl-accent:#0077C8;    /* NSW Action Blue */
  --cl-bg:#F2F6FA;        /* Neutral background */
  --cl-text:#212121;      /* Body text */
  --cl-muted:#4A4A4A;
  --cl-border:#D1D9E0;

  --radius:12px;
  --shadow-soft:0 6px 16px rgba(0,38,100,.12);
  --maxw:1200px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font:16px/1.5 system-ui,-apple-system,"Segoe UI",Roboto,Arial;
  background:var(--cl-bg);
  color:var(--cl-text);
}

img{max-width:100%;display:block}
a{text-decoration:none}

.container{
  max-width:var(--maxw);
  margin:auto;
  padding:0 16px;
}

/* Top bar */
.topbar__inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:700;
  color:var(--cl-primary);
}

.brand img{
  height:28px;
  width:auto;
}

.nav a{
  margin-left:20px;
  font-weight:600;
  color:var(--cl-text);
}

/* HERO */
.hero{
  min-height:320px;
  display:flex;
  align-items:center;
  color:#fff;
  background:linear-gradient(
    180deg,
    rgba(0,60,113,.65),
    rgba(0,60,113,.4)
  );
}

.hero__inner{padding:64px 16px}
.hero h1{font-size:42px;margin:0 0 10px}
.hero p{margin:0;color:#E8EEF5}

/* Buttons */
.btn{
  display:inline-block;
  padding:10px 14px;
  border-radius:8px;
  font-weight:700;
  background:#0096D6;
  color:#fff;
  margin-right:10px;
}

/* Grid */
.grid{
  display:grid;
  gap:18px;
  grid-template-columns:repeat(4,1fr);
}

@media(max-width:1100px){
  .grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:800px){
  .grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:520px){
  .grid{grid-template-columns:1fr}
}

/* Cards */
.card{
  background:#fff;
  border:1px solid var(--cl-border);
  border-radius:var(--radius);
  box-shadow:var(--shadow-soft);
  display:flex;
  flex-direction:column;
  min-height:260px;
  position:relative;
}

.card__media{
  height:120px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-bottom:1px solid var(--cl-border);
  background:#F8FAFC;
}

.card__media img{max-height:70px}

.card__body{padding:12px 14px}
.card__title{margin:0 0 6px;font-size:16.5px}
.card__text{color:var(--cl-muted);font-size:14.5px}

.card__actions{padding:10px 14px 14px}

.btn-open{
  display:inline-block;
  padding:8px 12px;
  border-radius:6px;
  background:#0096D6;
  color:#fff;
  font-size:13px;
  font-weight:700;
}

/* Badges */
.badge{
  position:absolute;
  top:10px;
  left:10px;
  padding:3px 8px;
  font-size:12px;
  font-weight:700;
  border-radius:999px;
  background:#DBEAFE;
  color:#1E3A8A;
}

.badge + .badge{top:36px}

.badge--training,
.badge--review{
  background:#FEF3C7;
  color:#92400E;
}

section{padding:26px 0}

  </style>
</head>

<body>

<header class="topbar">
  <div class="container topbar__inner">
    <div class="brand">
      <img src="assets/nsw-logo.svg" alt="NSW Government logo">
      <span>Crown Land Spatial Hub</span>
    </div>
    <nav class="nav">
      <a href="#apps">Applications</a>
      <a href="#data-catalogue">Data Catalogue</a>
      <a href="#support">Support</a>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="hero__inner container">
    <h1>Crown Land Spatial HUB</h1>
    <p>ArcGIS Online Applications, Reporting Tools &amp; Dashboards</p>
    <p>Accessible with industry or any generic AGOL account</p>
    <br>

    <a href="#apps" class="btn">Browse Applications</a>
    <a href="mailto:crown.applications@crownland.nsw.gov.au" class="btn">Contact Support</a>
    <a href="#data-catalogue" class="btn">Data Catalogue</a>
  </div>
</section>
